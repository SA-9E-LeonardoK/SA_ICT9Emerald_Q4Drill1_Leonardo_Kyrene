<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <title>Q4 Drill 1</title>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom right, #E8D1A7, #9D9167);
            min-height: 100vh;
        }

        h3 {
            color: #442D1C;
            font-size: 1.1rem;
            font-weight: 600;
        }

        #kWh {
            font-size: 2.5rem;
            font-weight: 600;
            color: #E8D1A7;
        }

        .main-card {
            background: #442D1C;
            border-radius: 1.2rem;
            padding: 2rem;
            max-width: 420px;
            width: 100%;
        }

        .form-control {
            border: 1.5px solid #84592B;
            border-radius: 0.5rem;
            background: rgba(232, 209, 167, 0.1);
            color: #E8D1A7;
        }

        .form-control::placeholder {
            color: rgba(232, 209, 167, 0.4);
        }

        .form-control:focus {
            background: rgba(232, 209, 167, 0.15);
            border-color: #84592B;
            box-shadow: none;
            color: #E8D1A7;
        }

        .btn-classify {
            background: #743014;
            border: none;
            border-radius: 0.5rem;
            color: #E8D1A7;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            width: 100%;
            padding: 0.6rem;
        }

        .btn-classify:hover {
            background: #84592B;
            color: #E8D1A7;
        }

        #message1 {
            color: #f4a261;
            font-size: 0.85rem;
        }
    </style>
    
</head>
<body>
    
    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="main-card">

            <h3>Electricity Consumption Classifier</h3>
            <hr style="border-color: #84592B;">

            <img src="electric_logo.png" style="height: 80px; width: 130px;">
            <br>
            <h1 id="kWh" class="m-2">kWh</h1>

            <input type="text" class="form-control mb-3" id="consumption" placeholder="Input kilowatt per hour ?">

            <button type="button" class="btn btn-classify mb-2" onclick="check_class()">Consumption Classification</button>

            <br><br>
            <p><span id="message1" class="fst-italic"></span></p>

        </div>
    </div>

    <script>
        function check_class(){
        
            var checker = document.getElementById("consumption").value;
            var A = "Lifeline Consumer"; //0-100kWh
            var B = "Low Consumption"; //101-200kWh
            var C = "Average Consumption"; //201-300kWh
            var D = "High Consumption"; //301-500kWh
            var E = "Very High Consumption"; //above 500kWh

            // Check for invalid input (negative or non-numeric)
            if (isNaN(checker) || checker < 0) {
                document.getElementById("message1").innerHTML = "Please input a valid number.";
                
            }
        
            else if (checker <= 100) {
                alert(A + " : Discounted electricity rates to help low-income households.");
                window.location.reload();
            }
            
            else if (checker <= 200) {
                alert(B + " : Normal residential rate.");
                window.location.reload();
            }
        
            else if (checker <= 300) {
                alert(C + " : Typical electricity usage.");
                window.location.reload();
            }
            
            else if (checker <= 500) {
                alert(D + " : Higher electricity usage.");
                window.location.reload();
            }
        
            else {
                alert(E + " : Heavy electricity users. ");
                window.location.reload();
            }
        }
    </script>
    
</body>
</html>
